name: Update Iran IP Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go run ./cmd/ -fetch-only

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dist/

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "chore(data): update iran ip ranges [skip ci]"
          git push

      - name: Create release archive
        run: |
          cd dist && zip -r ../iran-ip-ranges.zip .

      - name: Build binaries
        run: |
          mkdir -p dist/bin
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/bin/iran-ip-linux-amd64 ./cmd/
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/bin/iran-ip-darwin-arm64 ./cmd/
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/bin/iran-ip-windows-amd64.exe ./cmd/

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create or update daily release
        uses: ncipollo/release-action@v1
        with:
          tag: daily-${{ steps.date.outputs.date }}
          name: Daily Update ${{ steps.date.outputs.date }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: false
          omitBodyDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

          artifacts: |
            iran-ip-ranges.zip
            dist/bin/*
            dist/checksums.txt

          body: |
            ## Iran IP Lists — Daily Update

            Automatically updated Iran IPv4/IPv6 ranges.

            ### Pre-built Binaries

            | Platform          | Download |
            |-------------------|----------|
            | Linux             | [`iran-ip-linux-amd64`](https://github.com/farshidmousavii/iran-ip-ranges/releases/download/daily-${{ steps.date.outputs.date }}/iran-ip-linux-amd64) |
            | macOS (Apple Silicon) | [`iran-ip-darwin-arm64`](https://github.com/farshidmousavii/iran-ip-ranges/releases/download/daily-${{ steps.date.outputs.date }}/iran-ip-darwin-arm64) |
            | Windows           | [`iran-ip-windows-amd64.exe`](https://github.com/farshidmousavii/iran-ip-ranges/releases/download/daily-${{ steps.date.outputs.date }}/iran-ip-windows-amd64.exe) |

            ### Data Files

            - [`iran-ip-ranges.zip`](https://github.com/farshidmousavii/iran-ip-ranges/releases/download/daily-${{ steps.date.outputs.date }}/iran-ip-ranges.zip) — all IP list files in one archive
            - [`checksums.txt`](https://github.com/farshidmousavii/iran-ip-ranges/releases/download/daily-${{ steps.date.outputs.date }}/checksums.txt) — SHA256 checksums

            ### Usage

            ```bash
            # Linux / macOS
            chmod +x iran-ip-linux-amd64
            ./iran-ip-linux-amd64

            # Windows (PowerShell)
            .\iran-ip-windows-amd64.exe
            ```
